<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Media Query Demo</title>

  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Responsive Media Query Demo</h1>

      <p>
        This webpage automatically changes its layout, colors,
        and font sizes depending on the screen size.
      </p>

      <div class="screen-boxes">
        <div class="box mobile">
          📱 Mobile View
        </div>

        <div class="box tablet">
          💻 Tablet View
        </div>

        <div class="box desktop">
          🖥 Desktop View
        </div>
      </div>

      <button>Explore More</button>
    </div>
  </div>

</body>
</html>
